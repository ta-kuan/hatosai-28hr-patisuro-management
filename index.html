<html>

    <meta charset="UTF-8">

    <title>スロット - 28HR - 管理画面</title>
    <style>

  <body>
    <div>
      <input id="text1" type="number" value=0>
      <button onclick="send(1,'text1')">送信1</button>
    </div>
    <div>
      <input id="text2" type="number" value=0>
      <button onclick="send(2,'text2')">送信2</button>
    </div>
    <div>
      <input id="text3" type="number" value=0>
      <button onclick="send(3,'text3')">送信3</button>
    </div>
    <div>
      <input id="text4" type="number" value=0>
      <button onclick="send(4,'text4')">送信4</button>
    </div>
    <div>
      <input id="text5" type="number" value=0>
      <button onclick="send(5,'text5')">送信5</button>
    </div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
      import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      const firebaseConfig = {
        apiKey: "AIzaSyCdr0-2-H3jLSNsIIF1Bhou4BehZn8Ka2A",
        authDomain: "hatosai-link-28hr.firebaseapp.com",
        databaseURL: "https://hatosai-link-28hr-default-rtdb.firebaseio.com",
        projectId: "hatosai-link-28hr"
      };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      // Bだけログイン
      const auth = getAuth();
      signInAnonymously(auth);
      // 送信
      window.send = (id, inputId) => {
        const result = confirm("id" + id + "のコインを" + document.getElementById(inputId).value + "に変更");
        if (result) {
          const text = document.getElementById(inputId).value;
          set(ref(db, "messages/" + id), text);
        }
      };
    </script>
  </body>
</html>
